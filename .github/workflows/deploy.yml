name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Set up SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -p 22 server220.orangehost.com >> ~/.ssh/known_hosts 2>/dev/null

      - name: Force-sync live folder to latest commit
        run: |
          ssh -i ~/.ssh/deploy_key -p 22 digisync@server220.orangehost.com '
            cd /home/digisync/public_html &&
            git fetch origin --prune &&
            git reset --hard origin/main &&
            git clean -fd
          '
