name: Deploy to cPanel

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via cPanel API
        run: |
          echo "=== Step 1: Pull from GitHub ==="
          curl -v -k -X POST \
            "https://digisyn.co:2083/execute/VersionControl/retrieve" \
            -u "${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_PASSWORD }}" \
            -d "repository_root=/home/digisync/public_html" 2>&1

          sleep 10

          echo "=== Step 2: Deploy ==="
          curl -v -k -X POST \
            "https://digisyn.co:2083/execute/VersionControlDeployment/create" \
            -u "${{ secrets.CPANEL_USERNAME }}:${{ secrets.CPANEL_PASSWORD }}" \
            -d "repository_root=/home/digisync/public_html" 2>&1
